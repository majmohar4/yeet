# Nginx reverse proxy configuration for yeet
# Place this in /etc/nginx/sites-available/yeet and symlink to sites-enabled/
# Requires: certbot (Let's Encrypt) for TLS

server {
    listen 80;
    server_name yeet.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yeet.example.com;

    # TLS certificates (generated by certbot)
    ssl_certificate     /etc/letsencrypt/live/yeet.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yeet.example.com/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (31536000 = 1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File upload size limit — must match MAX_FILE_SIZE in .env (100MB default)
    client_max_body_size 105M;

    # Proxy to yeet app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Pass real client IP to app for rate limiting
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Increase timeouts for large file uploads
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;

        # Disable buffering for upload progress to work
        proxy_request_buffering off;
    }

    # Deny direct access to admin panel from external IPs (optional — remove if admin access is needed)
    # location /admin {
    #     allow 10.0.0.0/8;
    #     deny all;
    #     proxy_pass http://127.0.0.1:8000;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}
