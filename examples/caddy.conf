# Caddy reverse proxy configuration for yeet
# Caddy handles TLS automatically via Let's Encrypt — no certbot needed.
# Place this in /etc/caddy/Caddyfile or import from your global Caddyfile.
#
# Install Caddy: https://caddyserver.com/docs/install

yeet.example.com {
    # Caddy automatically obtains and renews TLS certificates

    # Proxy to yeet app
    reverse_proxy localhost:8000 {
        # Pass real client IP for accurate rate limiting
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}

        # Increase timeouts for large file uploads (100MB can take a while)
        transport http {
            read_timeout  5m
            write_timeout 5m
            dial_timeout  10s
        }
    }

    # Increase max upload size to match MAX_FILE_SIZE (.env default: 100MB)
    # Caddy's default is 0 (unlimited), so this is optional but explicit
    request_body {
        max_size 105MB
    }

    # (Optional) Restrict admin panel access by IP
    # @admin path /admin/*
    # handle @admin {
    #     @allowed remote_ip 10.0.0.0/8 192.168.0.0/16
    #     handle @allowed {
    #         reverse_proxy localhost:8000
    #     }
    #     respond "Forbidden" 403
    # }

    # Log to file (optional)
    # log {
    #     output file /var/log/caddy/yeet.log
    # }
}
