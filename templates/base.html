<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}yeet{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📤</text></svg>">
</head>
<body>
  <div class="scanlines"></div>
  <header>
    <a href="/" class="logo">
      <span class="logo-bracket">[</span>yeet<span class="logo-bracket">]</span>
    </a>
    <span class="tagline">drop files. share links. done.</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>files expire in {{ expiry_hours|default(24) }}h · max {{ max_file_mb|default(100) }}MB</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/majmohar4/yeet" target="_blank" rel="noopener">source</a>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
